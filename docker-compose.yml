version: "3.8"

services:
  web:
    image: ghcr.io/tgx-coding/deepdick-public/core:latest
    network_mode: host
    restart: no
    command: python3 main.py
    volumes:
      - ./logs:/usr/src/app/logs
    environment:
      - wechat_login_code=
    #For log dir name
      - username=
      - cloud_music_cookie=
      - cloud_music_api=
      - API_KEY=
      - parents_name=
