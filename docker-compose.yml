version: "3.8"

services:
  web:
    image: ghcr.io/tgx-coding/deepdick-public/core:latest
    network_mode: host
    restart: no
    command: python3 main.py
    volumes:
      - ./logs:/usr/src/app/logs
    environment:
      - wechat_login_code=
      - username=                      #For log dir name
      - API_KEY=
      - parents_name=
